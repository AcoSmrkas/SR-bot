<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SR Bot Dashboard</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101316;
        --band: #171b20;
        --line: #2a3138;
        --muted: #9ca8b4;
        --text: #e9eef3;
        --good: #39c27f;
        --warn: #f0b84d;
        --bad: #f06c64;
        --info: #69a7ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 24px 14px;
        border-bottom: 1px solid var(--line);
        background: #14181d;
      }

      h1,
      h2 {
        margin: 0;
        font-weight: 700;
      }

      h1 {
        font-size: 20px;
      }

      h2 {
        font-size: 14px;
      }

      .muted,
      #clock,
      #subtitle {
        color: var(--muted);
      }

      #subtitle {
        margin-top: 3px;
      }

      main {
        display: grid;
        gap: 16px;
        padding: 18px 24px 28px;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(5, minmax(150px, 1fr));
        gap: 1px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--line);
      }

      .stat {
        min-height: 78px;
        padding: 14px;
        background: var(--band);
      }

      .label {
        color: var(--muted);
        font-size: 12px;
      }

      .value {
        margin-top: 6px;
        font-size: 20px;
        font-weight: 700;
        white-space: nowrap;
      }

      .split {
        display: grid;
        grid-template-columns: minmax(0, 1.35fr) minmax(340px, 0.65fr);
        gap: 16px;
      }

      .panel {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--band);
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 44px;
        padding: 0 14px;
        border-bottom: 1px solid var(--line);
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        min-width: 620px;
        border-collapse: collapse;
      }

      th,
      td {
        height: 38px;
        padding: 0 14px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        text-align: left;
        white-space: nowrap;
      }

      th {
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
      }

      a {
        color: var(--info);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 22px;
        padding: 0 8px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #11151a;
        color: var(--muted);
        font-size: 12px;
      }

      .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        margin-right: 7px;
        border-radius: 50%;
        background: var(--warn);
      }

      .good .dot,
      .dot.good {
        background: var(--good);
      }

      .bad .dot,
      .dot.bad {
        background: var(--bad);
      }

      .warn .dot,
      .dot.warn {
        background: var(--warn);
      }

      .state-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 1px;
        background: var(--line);
      }

      .state-item {
        min-height: 54px;
        padding: 11px 14px;
        background: var(--band);
      }

      .state-value {
        margin-top: 4px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .empty {
        padding: 20px 14px;
        color: var(--muted);
      }

      @media (max-width: 1050px) {
        .stats,
        .split {
          grid-template-columns: 1fr;
        }

        .stats {
          display: grid;
        }
      }

      @media (max-width: 640px) {
        header,
        main {
          padding-left: 14px;
          padding-right: 14px;
        }

        header {
          align-items: flex-start;
          flex-direction: column;
        }

        .stats {
          grid-template-columns: 1fr 1fr;
        }

        .value {
          font-size: 17px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>SR Bot</h1>
        <div id="subtitle">Connecting</div>
      </div>
      <div id="clock"></div>
    </header>

    <main>
      <section class="stats" id="stats"></section>

      <section class="split">
        <article class="panel">
          <div class="panel-head">
            <h2>Queue</h2>
            <span class="badge" id="queueSummary">0 groups</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Height</th>
                  <th>Boxes</th>
                  <th>Claimable</th>
                  <th>Rent</th>
                  <th>Assets</th>
                  <th>Seen</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="queueRows"></tbody>
            </table>
          </div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>Submit Nodes</h2>
            <span class="badge" id="nodeSummary">0 active</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
	                  <th>Node</th>
	                  <th>Name</th>
	                  <th>Height</th>
	                  <th>RTT</th>
                </tr>
              </thead>
              <tbody id="nodeRows"></tbody>
            </table>
          </div>
        </article>
      </section>

      <article class="panel">
        <div class="panel-head">
          <h2>Transactions</h2>
          <span class="badge" id="txSummary">0 recent</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Tx</th>
                <th>Status</th>
                <th>Boxes</th>
                <th>Rent</th>
                <th>Fee</th>
                <th>Created</th>
              </tr>
            </thead>
            <tbody id="txRows"></tbody>
          </table>
        </div>
      </article>

      <article class="panel">
        <div class="panel-head">
          <h2>Bot State</h2>
          <span class="badge" id="stateSummary">0 keys</span>
        </div>
        <div class="state-grid" id="stateGrid"></div>
      </article>
    </main>

    <script>
      const els = {
        subtitle: document.getElementById('subtitle'),
        clock: document.getElementById('clock'),
        stats: document.getElementById('stats'),
        queueSummary: document.getElementById('queueSummary'),
        queueRows: document.getElementById('queueRows'),
        nodeSummary: document.getElementById('nodeSummary'),
        nodeRows: document.getElementById('nodeRows'),
        txSummary: document.getElementById('txSummary'),
        txRows: document.getElementById('txRows'),
        stateSummary: document.getElementById('stateSummary'),
        stateGrid: document.getElementById('stateGrid')
      };

      const escapeHtml = value => String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));

      const shortId = value => value ? `${String(value).slice(0, 10)}...${String(value).slice(-6)}` : '-';
      const localTime = value => value ? new Date(value).toLocaleTimeString() : '-';
      const statusClass = status => status === 'confirmed' || status === 'claimed' ? 'good' : status === 'failed' || status === 'error' ? 'bad' : 'warn';
      const isErgoAddress = value => /^9[1-9A-HJ-NP-Za-km-z]{40,}$/.test(String(value || ''));
      const explorerAddressUrl = value => `https://ergexplorer.com/addresses/${encodeURIComponent(value)}&offset=0`;
      const linkedValue = value => isErgoAddress(value)
        ? `<a href="${explorerAddressUrl(value)}" target="_blank" rel="noreferrer">${escapeHtml(value)}</a>`
        : escapeHtml(value);

      function formatNano(value) {
        try {
          const nano = BigInt(value || 0);
          const sign = nano < 0n ? '-' : '';
          const abs = nano < 0n ? -nano : nano;
          const whole = abs / 1000000000n;
          const frac = (abs % 1000000000n).toString().padStart(9, '0').slice(0, 3);
          return `${sign}${whole}.${frac} ERG`;
        } catch {
          return '0.000 ERG';
        }
      }

      function renderStats(snapshot) {
        const bestNode = snapshot.bestSubmitNode
          ? (snapshot.bestSubmitNode.name || new URL(snapshot.bestSubmitNode.url).host)
          : '-';
        const status = snapshot.errors.length ? 'Warn' : 'Live';
        const stats = [
          ['Status', `<span class="${snapshot.errors.length ? 'warn' : 'good'}"><span class="dot"></span>${status}</span>`],
          ['Indexed Height', snapshot.indexedHeight ?? '-'],
          ['Best Submit Height', snapshot.bestSubmitHeight ?? '-'],
          ['Queued Boxes', snapshot.statusCounts.queued || 0],
          ['Rent Collected', formatNano(snapshot.metrics.totalRentCollected)]
        ];

        els.stats.innerHTML = stats.map(([label, value]) => `
          <div class="stat">
            <div class="label">${escapeHtml(label)}</div>
            <div class="value">${value}</div>
            ${label === 'Best Submit Height' ? `<div class="muted">${escapeHtml(bestNode)}</div>` : ''}
          </div>
        `).join('');
      }

      function renderQueue(snapshot) {
        els.queueSummary.textContent = `${snapshot.queue.length} groups`;
        if (!snapshot.queue.length) {
          els.queueRows.innerHTML = '<tr><td colspan="7" class="empty">No queued boxes</td></tr>';
          return;
        }

        els.queueRows.innerHTML = snapshot.queue.map(group => {
          const blocks = group.blocksUntilClaimable < 0
            ? `${Math.abs(group.blocksUntilClaimable)} blocks overdue`
            : group.blocksUntilClaimable === 0
              ? 'eligible now'
              : `${group.blocksUntilClaimable} blocks`;
          const statuses = Object.entries(group.statusCounts).map(([key, count]) => `${key}:${count}`).join(' ');
          return `
            <tr>
              <td>${group.creationHeight}</td>
              <td>${group.boxCount}</td>
              <td>${group.claimableAtHeight} <span class="muted">(${blocks})</span></td>
              <td>${formatNano(group.totalRentNano)}</td>
              <td>${group.assetCount}</td>
              <td>${localTime(group.lastDiscoveredAt)}</td>
              <td><span class="badge">${escapeHtml(statuses || '-')}</span></td>
            </tr>
          `;
        }).join('');
      }

      function renderNodes(snapshot) {
        els.nodeSummary.textContent = `${snapshot.activeSubmitNodes.length} active`;
        if (!snapshot.activeSubmitNodes.length) {
          els.nodeRows.innerHTML = '<tr><td colspan="4" class="empty">No active submit nodes</td></tr>';
          return;
        }

        els.nodeRows.innerHTML = snapshot.activeSubmitNodes.slice(0, 24).map(node => `
          <tr>
            <td><code title="${escapeHtml(node.url)}">${escapeHtml(new URL(node.url).host)}</code></td>
            <td>${escapeHtml(node.name || '-')}</td>
            <td>${node.fullHeight}</td>
            <td>${node.responseTimeMs == null ? '-' : `${node.responseTimeMs}ms`}</td>
          </tr>
        `).join('');
      }

      function renderTransactions(snapshot) {
        els.txSummary.textContent = `${snapshot.recentTransactions.length} recent`;
        if (!snapshot.recentTransactions.length) {
          els.txRows.innerHTML = '<tr><td colspan="6" class="empty">No transactions yet</td></tr>';
          return;
        }

        els.txRows.innerHTML = snapshot.recentTransactions.map(tx => `
          <tr>
            <td><a href="https://ergexplorer.com/transactions/${encodeURIComponent(tx.txId)}" target="_blank" rel="noreferrer"><code title="${escapeHtml(tx.txId)}">${escapeHtml(shortId(tx.txId))}</code></a></td>
            <td><span class="${statusClass(tx.status)}"><span class="dot"></span>${escapeHtml(tx.status)}</span></td>
            <td>${tx.boxCount}</td>
            <td>${formatNano(tx.totalRentNano)}</td>
            <td>${formatNano(tx.transactionFeeNano)}</td>
            <td>${localTime(tx.createdAt)}</td>
          </tr>
        `).join('');
      }

      function renderState(snapshot) {
        const entries = Object.entries(snapshot.botState);
        els.stateSummary.textContent = `${entries.length} keys`;
        els.stateGrid.innerHTML = entries.length
          ? entries.map(([key, value]) => `
            <div class="state-item">
              <div class="label">${escapeHtml(key)}</div>
              <div class="state-value" title="${escapeHtml(value)}">${linkedValue(value)}</div>
            </div>
          `).join('')
          : '<div class="empty">No state stored</div>';
      }

      function render(snapshot) {
        const age = snapshot.generatedAt ? new Date(snapshot.generatedAt).toLocaleTimeString() : '-';
        els.subtitle.textContent = snapshot.errors.length ? snapshot.errors.join(' | ') : `Updated ${age}`;
        els.clock.textContent = new Date().toLocaleString();
        renderStats(snapshot);
        renderQueue(snapshot);
        renderNodes(snapshot);
        renderTransactions(snapshot);
        renderState(snapshot);
      }

      function connect() {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const socket = new WebSocket(`${proto}//${location.host}/ws`);
        socket.addEventListener('open', () => {
          els.subtitle.textContent = 'Connected';
        });
        socket.addEventListener('message', event => {
          render(JSON.parse(event.data));
        });
        socket.addEventListener('close', () => {
          els.subtitle.textContent = 'Disconnected, reconnecting';
          setTimeout(connect, 1500);
        });
        socket.addEventListener('error', () => socket.close());
      }

      connect();
    </script>
  </body>
</html>
